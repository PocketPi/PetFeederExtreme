<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        table {
            width: 75%;
            margin-left: auto;
            margin-right: auto;
        }

        td {
            border: 1px solid black;
            border-collapse: collapse;
            width: 10%;
        }
    </style>

    <title>Pet Feeder Extreme </title>
    <h1 style="color: #5e9ca0; text-align: center;">Pet Feeder Extreme</h1>
    <form method="POST" action="save_settings">
        <table>
            <tr name="header">
                <th>Time</th>
                <th>Amount[g]</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
                <th>Saturday</th>
                <th>Sunday</th>
                <th>Active</th>
            </tr>
            <tr name="first">
                <td><input type="time" name="time" value="07:00" autofocus></td>
                <td><input type="number" name="weight" min="1" max="100" step="1" size="3" value="35"></td>
                <td><input type="checkbox" name="monday" unchecked></td>
                <td><input type="checkbox" name="tuesday" unchecked></td>
                <td><input type="checkbox" name="wednesday" unchecked></td>
                <td><input type="checkbox" name="thursday" unchecked></td>
                <td><input type="checkbox" name="friday" unchecked></td>
                <td><input type="checkbox" name="saturday" unchecked></td>
                <td><input type="checkbox" name="sunday" unchecked></td>
                <td><input type="checkbox" name="active" unchecked></td>
            </tr>
            <tr name="second">
                <td><input type="time" name="time" value="17:00"></td>
                <td><input type="number" name="weight" min="1" max="100" step="1" size="3" value="35"></td>
                <td><input type="checkbox" name="monday" unchecked></td>
                <td><input type="checkbox" name="tuesday" unchecked></td>
                <td><input type="checkbox" name="wednesday" unchecked></td>
                <td><input type="checkbox" name="thursday" unchecked></td>
                <td><input type="checkbox" name="friday" unchecked></td>
                <td><input type="checkbox" name="saturday" unchecked></td>
                <td><input type="checkbox" name="sunday" unchecked></td>
                <td><input type="checkbox" name="active" unchecked></td>
            </tr>
        </table>

        <input type="submit" value="Save" center>
    </form>
</html>
